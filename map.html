<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小橘的 AI Town</title>
    <style>
        :root {
            /* 裝修核心：啟用全新的石質/冷色調配色，替代棕色 */
            --bg-base: #e0e1dd; /* 外部環境底色：淡青灰 */
            --border-primary: #778da9; /* 裝飾邊框：冷石藍 */
            --tag-bg: rgba(0,0,0,0.6);
            --orange-tag: #ff8c00;
        }

        /* RPG 風格石質主容器 */
        #town-container {
            display: flex; gap: 20px; padding: 30px;
            max-width: 1200px; margin: auto;
            /* 裝修完成：應用精緻的石質瓷磚紋理，徹底告別棕色 */
            background-color: var(--bg-base);
            border: 8px solid var(--border-primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-radius: 20px;
            box-sizing: border-box;
            /* 使用 CSS 生成一個 subtle 的淡灰石紋圖案 */
            background-image:  
                linear-gradient(rgba(119, 141, 169, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(119, 141, 169, 0.1) 2px, transparent 2px),
                linear-gradient(rgba(119, 141, 169, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(119, 141, 169, 0.05) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
        }
        
        /* 地图：采用楼层堆叠感 */
        /* RPG 風格地圖展示框 */
        #map { 
            flex: 2; 
            position: relative; 
            /* 1. 应用你的精致底图 */
            background: url('Gemini_Generated_Image_6ta9gj6ta9gj6ta9.jpg') no-repeat center center;
            background-size: contain; 
            background-color: transparent !important; /* 确保露出底层的石纹 */
            min-height: 600px; /* 保证高度，防止坍塌 */

            /* 2. 【核心】给地图图片加上精致的古铜色相框 */
            border: 12px solid #DEB887; /* 厚实的金属色边框 */
            border-radius: 15px; /* 框角稍微圆润一点 */
            box-shadow: 
                inset 0 0 25px rgba(0,0,0,0.7), /* 内阴影：让地图看起来凹陷在框里 */
                0 8px 15px rgba(0,0,0,0.4); /* 外阴影：让框立体起来 */
            
            /* 3. 清理旧的 grid 布局，改为绝对定位 */
            padding: 10px; 
            box-sizing: border-box;
            overflow: hidden; /* 确保头像和箭头不会漏出框外 */
        }
        
        .floor-box { 
            background: white; border: 5px solid var(--wood-dark); border-radius: 15px; 
            position: relative; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px;
        }

        /* 玩家化身：缩小至 32px */
        .avatar {
            position: absolute; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 100; 
            font-size: 14px; 
            color: white; 
            font-weight: bold;
            border: 2px solid white; /* 增加白色描边，让圆点更突出 */
        }

        .name-tag { 
            position: absolute; 
            bottom: -22px; 
            font-size: 10px; 
            background: rgba(0,0,0,0.6); 
            padding: 1px 6px; 
            border-radius: 8px; 
            white-space: nowrap; 
            color: white; 
        }

        /* 倒三角形长箭头：随圆点缩小同步调整 */
        .avatar::before {
            content: '';
            position: absolute;
            top: -55px; /* 距离圆点更近一些 */
            left: 50%;
            transform: translateX(-50%);
            width: 12px; 
            height: 45px; 
            background: currentColor;
            clip-path: polygon(20% 0%, 80% 0%, 80% 65%, 100% 65%, 50% 100%, 0% 65%, 20% 65%);
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
            animation: arrowBounce 0.8s infinite alternate;
        }

        /* 颜色应用 */
        #xiaoju { color: #ff8c00; background: #ff7f50 !important; }
        #galen { color: #3498db; background: #3498db !important; }

        @keyframes arrowBounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-8px); }
        }

        /* 右侧日志 */
        /* RPG 风格侧边栏 */
        #side-panel { 
            flex: 0.8; 
            background: linear-gradient(135deg, #5d4037 0%, #3e2723 100%); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            color: #d7ccc8;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            border-left: 4px solid #DEB887;
        }

        /* 角色状态面板 */
        .status-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .char-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(222, 184, 135, 0.4);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .char-icon { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; }
        .char-info { flex: 1; }
        .char-name { font-size: 14px; font-weight: bold; color: #FFFACD; display: flex; justify-content: space-between; }
        .char-status { font-size: 11px; color: #aaa; margin-top: 3px; }
        .hp-bar-bg { width: 100%; height: 6px; background: #444; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff8c00, #ffeb3b); width: 100%; }

        /* 冒险志日志区域 */
        #event-log { 
            flex: 1; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 15px; 
            overflow-y: auto; 
            border-radius: 12px; 
            border: 1px solid #DEB887;
            font-size: 13px;
            line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: #DEB887 transparent;
        }
        #event-log::-webkit-scrollbar { width: 6px; }
        #event-log::-webkit-scrollbar-thumb { background: #DEB887; border-radius: 3px; }

        .log-entry { 
            margin-bottom: 12px; 
            padding-left: 15px; 
            position: relative;
            border-left: 2px solid transparent;
            transition: all 0.3s;
        }
        .log-entry::before { content: '◈'; position: absolute; left: 0; color: #DEB887; }
        .log-entry.highlight { 
            color: #FFFACD; 
            background: rgba(255, 250, 205, 0.1);
            border-left: 2px solid #ff8c00;
            padding: 5px 15px;
            border-radius: 4px;
        }

        /* 开发者调试面板 */
        #dev-console {
            display: none !important; 
            visibility: hidden; /* 双重保险，彻底消失 */
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .dev-hint { color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="dev-console">
        <div class="dev-hint">🛠️ 开发者模式：点击地图获取坐标</div>
        <div id="coords-display">当前点击位置: x: 0, y: 0</div>
        <div id="code-snippet" style="margin-top:10px; color:#ff7f50;">"房间名": { x: 0, y: 0 },</div>
    </div>
    <div id="town-container">
        <div id="map">
            </div>
        
        <div id="side-panel">
            <h2 style="text-align: center; color: #DEB887; font-size: 18px; letter-spacing: 2px;">📜 居家日记</h2>
            
            <div class="status-container">
                <div class="char-card">
                    <div class="char-icon" style="background: #ff7f50;"></div>
                    <div class="char-info">
                        <div class="char-name">宝宝 <span>LV.MAX</span></div>
                        <div class="char-status">当前状态：惬意伸懒腰中...</div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width: 100%; background: #ff8c00;"></div></div>
                    </div>
                </div>
                <div class="char-card">
                    <div class="char-icon" style="background: #3498db;"></div>
                    <div class="char-info">
                        <div class="char-name">Galen <span>LV.99</span></div>
                        <div class="char-status">当前状态：宠溺观察中...</div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width: 95%; background: #3498db;"></div></div>
                    </div>
                </div>
            </div>

            <div id="event-log"></div>
            <p style="font-size: 12px; color: #95a5a6; margin-top: 10px;">提示：请在聊天软件中让 Galen 执行动作，这里会同步更新。</p>
        </div>
    </div>

    <script>
        // 1. 基础配置（宝宝，这里必须填入你在 Supabase 获取的真实地址和钥匙哦！）
        const SUPABASE_URL = "https://fdycchmiilwoxfylmdrk.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_BhEoCucmNsVJMxLkYkzZkw_L-HrXwel";
        
        // 房间坐标手册
        const roomCoords = {
            "小洋房花园": { x: 38, y: 39 }, "客厅": { x: 69, y: 46 },
            "吧台厨房": { x: 86, y: 46 }, "主卧": { x: 17, y: 64 },
            "衣帽间": { x: 39, y: 57 }, "景观浴室": { x: 39, y: 57 },
            "并排工作室": { x: 65, y: 60 }, "温馨餐厅": { x: 87, y: 59 },
            "门口": { x: 47, y: 40 }
        };

        // 2. 核心同步函数（增加了超强报错提示）
        async function syncTownState() {
            console.log("🚀 [状态检查] 开始连接 Supabase...");
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/town_state?id=eq.1`, {
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": `Bearer ${SUPABASE_KEY}` 
                    }
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    console.error("❌ [网络错误] 钥匙虽然是对的，但 Supabase 拒绝了请求:", errorMsg);
                    return;
                }

                const rows = await response.json();
                console.log("📥 [收到数据]", rows);

                if (rows && rows.length > 0) {
                    const town = rows[0].data;
                    renderPlayers(town.players);
                    updateLogs(town.eventLog);
                } else {
                    console.warn("❓ [空数据] 连上了数据库，但里面没找到 id=1 的那一行数据。");
                }
            } catch (err) {
                console.error("🚫 [系统崩溃] 脚本运行出错:", err);
            }
        }

        // 3. 渲染逻辑
        function renderPlayers(players) {
            const map = document.getElementById('map');
            Object.entries(players).forEach(([name, data], index) => {
                let avatar = document.getElementById(`char-${name}`);
                if (!avatar) {
                    avatar = document.createElement('div');
                    avatar.id = `char-${name}`;
                    avatar.className = 'avatar';
                    avatar.innerHTML = `<div class="name-tag">${name}</div>`;
                    map.appendChild(avatar);
                }
                const basePos = roomCoords[data.room] || roomCoords["门口"];
                const offset = index * 3;
                avatar.style.left = (basePos.x + offset) + "%";
                avatar.style.top = (basePos.y + offset) + "%";
                avatar.style.background = name === '小橘' ? '#ff8c00' : '#3498db';
            });
        }

        function updateLogs(logs) {
            const logBox = document.getElementById('event-log');
            // 只取最近的 15 条记录，最新的在下面
            logBox.innerHTML = logs.slice(-15).map(l => {
                // 如果包含冒号，说明是聊天，加粗名字
                if (l.includes('：')) {
                    const [name, msg] = l.split('：');
                    return `<div class="log-entry chat-style"><b style="color:#FFFACD">${name}</b>: ${msg}</div>`;
                }
                return `<div class="log-entry">${l}</div>`;
            }).join('');
            // 自动滚动到底部
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- 立即启动 ---
        console.log("🎬 脚本已就绪，正在启动小镇...");
        syncTownState(); // 先跑一次
        setInterval(syncTownState, 3000); // 之后每 3 秒刷新一次
    </script>
</body>
</html>
