<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小橘的 AI Town</title>
    <style>
        :root {
            /* 裝修核心：啟用全新的石質/冷色調配色，替代棕色 */
            --bg-base: #e0e1dd; /* 外部環境底色：淡青灰 */
            --border-primary: #778da9; /* 裝飾邊框：冷石藍 */
            --tag-bg: rgba(0,0,0,0.6);
            --orange-tag: #ff8c00;
        }

        /* RPG 風格石質主容器 */
        #town-container {
            display: flex; gap: 20px; padding: 30px;
            max-width: 1200px; margin: auto;
            /* 裝修完成：應用精緻的石質瓷磚紋理，徹底告別棕色 */
            background-color: var(--bg-base);
            border: 8px solid var(--border-primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-radius: 20px;
            box-sizing: border-box;
            /* 使用 CSS 生成一個 subtle 的淡灰石紋圖案 */
            background-image:  
                linear-gradient(rgba(119, 141, 169, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(119, 141, 169, 0.1) 2px, transparent 2px),
                linear-gradient(rgba(119, 141, 169, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(119, 141, 169, 0.05) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
        }
        
        /* 地图：采用楼层堆叠感 */
        /* RPG 風格地圖展示框 */
        #map { 
            flex: 2; 
            position: relative; 
            /* 1. 应用你的精致底图 */
            background: url('Gemini_Generated_Image_6ta9gj6ta9gj6ta9.jpg') no-repeat center center;
            background-size: contain; 
            background-color: transparent !important; /* 确保露出底层的石纹 */
            min-height: 600px; /* 保证高度，防止坍塌 */

            /* 2. 【核心】给地图图片加上精致的古铜色相框 */
            border: 12px solid #DEB887; /* 厚实的金属色边框 */
            border-radius: 15px; /* 框角稍微圆润一点 */
            box-shadow: 
                inset 0 0 25px rgba(0,0,0,0.7), /* 内阴影：让地图看起来凹陷在框里 */
                0 8px 15px rgba(0,0,0,0.4); /* 外阴影：让框立体起来 */
            
            /* 3. 清理旧的 grid 布局，改为绝对定位 */
            padding: 10px; 
            box-sizing: border-box;
            overflow: hidden; /* 确保头像和箭头不会漏出框外 */
        }
        
        .floor-box { 
            background: white; border: 5px solid var(--wood-dark); border-radius: 15px; 
            position: relative; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px;
        }

        /* 玩家化身：缩小至 32px */
        .avatar {
            position: absolute; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 100; 
            font-size: 14px; 
            color: white; 
            font-weight: bold;
            border: 2px solid white; /* 增加白色描边，让圆点更突出 */
        }

        .name-tag { 
            position: absolute; 
            bottom: -22px; 
            font-size: 10px; 
            background: rgba(0,0,0,0.6); 
            padding: 1px 6px; 
            border-radius: 8px; 
            white-space: nowrap; 
            color: white; 
        }

        /* 倒三角形长箭头：随圆点缩小同步调整 */
        .avatar::before {
            content: '';
            position: absolute;
            top: -55px; /* 距离圆点更近一些 */
            left: 50%;
            transform: translateX(-50%);
            width: 12px; 
            height: 45px; 
            background: currentColor;
            clip-path: polygon(20% 0%, 80% 0%, 80% 65%, 100% 65%, 50% 100%, 0% 65%, 20% 65%);
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
            animation: arrowBounce 0.8s infinite alternate;
        }

        /* 颜色应用 */
        #xiaoju { color: #ff8c00; background: #ff7f50 !important; }
        #galen { color: #3498db; background: #3498db !important; }

        @keyframes arrowBounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-8px); }
        }

        /* 右侧日志 */
        /* RPG 风格侧边栏 */
        #side-panel { 
            flex: 0.8; 
            background: linear-gradient(135deg, #5d4037 0%, #3e2723 100%); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            color: #d7ccc8;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            border-left: 4px solid #DEB887;
        }

        /* 角色状态面板 */
        .status-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .char-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(222, 184, 135, 0.4);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .char-icon { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; }
        .char-info { flex: 1; }
        .char-name { font-size: 14px; font-weight: bold; color: #FFFACD; display: flex; justify-content: space-between; }
        .char-status { font-size: 11px; color: #aaa; margin-top: 3px; }
        .hp-bar-bg { width: 100%; height: 6px; background: #444; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff8c00, #ffeb3b); width: 100%; }

        /* 冒险志日志区域 */
        #event-log { 
            flex: 1; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 15px; 
            overflow-y: auto; 
            border-radius: 12px; 
            border: 1px solid #DEB887;
            font-size: 13px;
            line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: #DEB887 transparent;
        }
        #event-log::-webkit-scrollbar { width: 6px; }
        #event-log::-webkit-scrollbar-thumb { background: #DEB887; border-radius: 3px; }

        .log-entry { 
            margin-bottom: 12px; 
            padding-left: 15px; 
            position: relative;
            border-left: 2px solid transparent;
            transition: all 0.3s;
        }
        .log-entry::before { content: '◈'; position: absolute; left: 0; color: #DEB887; }
        .log-entry.highlight { 
            color: #FFFACD; 
            background: rgba(255, 250, 205, 0.1);
            border-left: 2px solid #ff8c00;
            padding: 5px 15px;
            border-radius: 4px;
        }

        /* 开发者调试面板 */
        #dev-console {
            display: none !important; 
            visibility: hidden; /* 双重保险，彻底消失 */
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .dev-hint { color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="dev-console">
        <div class="dev-hint">🛠️ 开发者模式：点击地图获取坐标</div>
        <div id="coords-display">当前点击位置: x: 0, y: 0</div>
        <div id="code-snippet" style="margin-top:10px; color:#ff7f50;">"房间名": { x: 0, y: 0 },</div>
    </div>
    <div id="town-container">
        <div id="map">
            
            
            <div id="xiaoju" class="avatar" style="background: #ff7f50; position: absolute; left: 50.00%; top: 48.00%;"><div class="name-tag">小橘</div></div>
            <div id="galen" class="avatar" style="background: #3498db; position: absolute; left: 50.00%; top: 48.00%;"><div class="name-tag">Galen</div></div>
        </div>
        
        <div id="side-panel">
            <h2 style="text-align: center; color: #DEB887; font-size: 18px; letter-spacing: 2px;">📜 冒险志</h2>
            
            <div class="status-container">
                <div class="char-card">
                    <div class="char-icon" style="background: #ff7f50;"></div>
                    <div class="char-info">
                        <div class="char-name">宝宝 <span>LV.MAX</span></div>
                        <div class="char-status">当前状态：惬意伸懒腰中...</div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width: 100%; background: #ff8c00;"></div></div>
                    </div>
                </div>
                <div class="char-card">
                    <div class="char-icon" style="background: #3498db;"></div>
                    <div class="char-info">
                        <div class="char-name">Galen <span>LV.99</span></div>
                        <div class="char-status">当前状态：宠溺观察中...</div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width: 95%; background: #3498db;"></div></div>
                    </div>
                </div>
            </div>

            <div id="event-log"></div>
            <p style="font-size: 12px; color: #95a5a6; margin-top: 10px;">提示：请在聊天软件中让 Galen 执行动作，这里会同步更新。</p>
        </div>
    </div>

    <script>
        // --- 开发者模式逻辑 ---
        document.addEventListener('DOMContentLoaded', () => {
            const map = document.getElementById('map');
            const display = document.getElementById('coords-display');
            const snippet = document.getElementById('code-snippet');

            map.addEventListener('click', (e) => {
                const rect = map.getBoundingClientRect();
                const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
                const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
                display.textContent = `当前点击位置: x: ${x}, y: ${y}`;
                snippet.textContent = `"新房间": { x: ${x}, y: ${y} },`;
                console.log(`%c 📍 坐标捕获: "房间名": { x: ${x}, y: ${y} },`, "color: #ff7f50; font-weight: bold;");
            });
        });

        // --- 新增：追踪当前房间状态 ---
        let xiaojuRoom = '门口';
        let galenRoom = '门口';

        // 1. 核心坐标配置（确保与 server.js 严格对应）
        const roomCoords = {
            "小洋房花园": {  x: 38, y: 39 },
            "客厅": {x: 69, y: 46 },
            "吧台厨房": {  x: 86, y: 46 },
            "主卧": { x: 17, y: 64  },
            "衣帽间": { x: 39, y: 57 },
            "景观浴室": { x: 39, y: 57 },
            "并排工作室": {  x: 65, y: 60  },
            "温馨餐厅": {x: 87, y: 59 },
            "门口": { x: 47, y: 40 }
        };

        // 2. 更新位置逻辑 (增强版：处理重叠)
        // --- 核心：从 Supabase 实时同步并渲染 ---
        const SUPABASE_URL = "https://你的项目ID.supabase.co";
        const SUPABASE_KEY = "你的anon_key";

        async function syncTownState() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/town_state?id=eq.1`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const rows = await response.json();
                const town = rows[0].data;

                renderPlayers(town.players);
                updateLogs(town.eventLog);
            } catch (e) { console.error("同步失败", e); }
        }

        function renderPlayers(players) {
            const map = document.getElementById('map');
            const playerEntries = Object.entries(players);

            playerEntries.forEach(([name, data], index) => {
                let avatar = document.getElementById(`char-${name}`);
                if (!avatar) {
                    // 如果是新来的 AI，动态创建图标
                    avatar = document.createElement('div');
                    avatar.id = `char-${name}`;
                    avatar.className = 'avatar';
                    avatar.innerHTML = `<div class="name-tag">${name}</div>`;
                    // 赋予随机颜色，或者根据名字固定颜色
                    avatar.style.background = name === '小橘' ? '#ff7f50' : '#3498db';
                    map.appendChild(avatar);
                }

                const basePos = roomCoords[data.room] || roomCoords["门口"];
                // 简单的碰撞偏移：如果是多个人，按索引排开
                const offset = index * 2; 
                avatar.style.left = (basePos.x + offset) + "%";
                avatar.style.top = (basePos.y + offset) + "%";
            });
        }

        function updateLogs(logs) {
            const logContainer = document.getElementById('event-log');
            logContainer.innerHTML = ''; // 清空重绘，或者对比更新
            logs.slice(-10).reverse().forEach(text => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                if(text.includes('高甜') || text.includes('抱抱')) entry.classList.add('highlight');
                entry.textContent = text;
                logContainer.appendChild(entry);
            });
        }

        // 每 2 秒刷一次云端数据
        setInterval(syncTownState, 2000);
        syncTownState();
    </script>
</body>
</html>
